{% extends 'base.html' %}

{% block title %}Manage categories{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Categories</h1>
    <a href="{% url 'backoffice:category_create' %}" class="btn btn-dark">Add category</a>
</div>

<div class="table-responsive">
    <table class="table align-middle">
        <thead>
            <tr><th>Name</th><th>Slug</th><th></th></tr>
        </thead>
        <tbody>
            {% for category in categories %}
                <tr>
                    <td>{{ category.name }}</td>
                    <td>{{ category.slug }}</td>
                    <td>
                        <a href="{% url 'backoffice:category_edit' category.pk %}" class="btn btn-sm btn-outline-secondary">Edit</a>
                        <a href="{% url 'backoffice:category_delete' category.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
                    </td>
                </tr>
            {% empty %}
                <tr><td colspan="3">No categories yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
<a href="{% url 'backoffice:panel_home' %}" class="btn btn-link">Back to backoffice</a>
{% endblock %}
